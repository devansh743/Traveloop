<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odyssey AI</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/screens.css">
</head>
<body class="bg-premium">

  <!-- AUTH SCREEN -->
  <div id="screen-auth" class="screen"></div>

  <!-- APP CHROME (Shown after login) -->
  <aside class="sidebar hidden" id="sidebar">
    <div class="sidebar-logo">
      <svg class="logo-svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 1 0 10 10H12V2z"></path>
        <path d="M12 12 2.1 7.1"></path>
        <path d="M12 12l8.9 4.9"></path>
      </svg>
      <span class="logo-text">Odyssey</span>
    </div>
    
    <div class="sidebar-scrollable">
      <div class="nav-section-title">PLANNING</div>
      <ul class="sidebar-nav">
        <li><a href="#" class="nav-link" data-screen="dashboard"><span class="nav-icon">◈</span> Dashboard</a></li>
        <li><a href="#" class="nav-link" data-screen="my-trips"><span class="nav-icon">◐</span> My Trips</a></li>
        <li><a href="#" class="nav-link" data-screen="create-trip"><span class="nav-icon">⊕</span> Plan Trip</a></li>
      </ul>

      <div class="nav-section-title">EXPLORE</div>
      <ul class="sidebar-nav">
        <li><a href="#" class="nav-link" data-screen="city-search"><span class="nav-icon">◎</span> Cities</a></li>
        <li><a href="#" class="nav-link" data-screen="activity-search"><span class="nav-icon">◇</span> Activities</a></li>
      </ul>

      <div class="nav-section-title">INTELLIGENCE</div>
      <ul class="sidebar-nav">
        <li><a href="#" class="nav-link" data-screen="chat"><span class="nav-icon">✨</span> AI Chat</a></li>
      </ul>
      
      <!-- hidden profile route for direct URL routing, not displayed in nav -->
      <a href="#" class="nav-link" data-screen="profile" style="display:none">Profile</a>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebarUser" onclick="Router.navigate('profile')">
        <div class="sidebar-user-avatar" id="sidebarAvatar">W</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebarName">Traveler</div>
          <div class="sidebar-user-role" id="sidebarRole">Explorer</div>
        </div>
      </div>
    </div>
  </aside>

  <header class="app-header hidden" id="app-header">
    <button class="menu-toggle" id="menuToggle">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <div class="header-title" id="headerTitle">◈ Dashboard</div>
    
    <div class="header-actions">
      <!-- Profile Dropdown Container -->
      <div class="profile-dropdown-container">
        <div class="header-avatar" id="headerAvatar">W</div>
        <div class="profile-dropdown" id="profileDropdown">
          <div class="dropdown-header">
            <strong>My Account</strong>
          </div>
          <a href="#" class="dropdown-item" onclick="Router.navigate('profile'); return false;">○ Profile Details</a>
          <a href="#" class="dropdown-item" onclick="openPreferencesModal(); return false;">⚙ Travel Preferences</a>
          <div class="dropdown-divider"></div>
          <a href="#" class="dropdown-item text-danger" id="logoutBtn">Sign Out</a>
        </div>
      </div>
    </div>
  </header>

  <main class="app-main" id="app-main" style="display:none">
    <!-- Screens are injected here -->
    <div id="screen-dashboard" class="screen" data-screen="dashboard"></div>
    <div id="screen-my-trips" class="screen" data-screen="my-trips"></div>
    <div id="screen-create-trip" class="screen" data-screen="create-trip"></div>
    <div id="screen-city-search" class="screen" data-screen="city-search"></div>
    <div id="screen-activity-search" class="screen" data-screen="activity-search"></div>
    <div id="screen-itinerary-builder" class="screen" data-screen="itinerary-builder"></div>
    <div id="screen-itinerary-view" class="screen" data-screen="itinerary-view"></div>
    <div id="screen-budget" class="screen" data-screen="budget"></div>
    <div id="screen-packing" class="screen" data-screen="packing"></div>
    <div id="screen-notes" class="screen" data-screen="notes"></div>
    <div id="screen-shared" class="screen" data-screen="shared"></div>
    <div id="screen-chat" class="screen" data-screen="chat"></div>
    <div id="screen-profile" class="screen" data-screen="profile"></div>
  </main>

  <!-- Preferences Modal -->
  <div class="modal-overlay" id="preferencesModal">
    <div class="modal">
      <div class="modal-header">
        <h3 style="font-family:'Cormorant Garamond',serif;font-size:24px;">Travel Preferences</h3>
        <button class="btn-close" onclick="closePreferencesModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Budget Style</label>
          <select class="form-input">
            <option>Budget Backpacking</option>
            <option>Balanced</option>
            <option>Luxury & Comfort</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Preferred Transport</label>
          <select class="form-input">
            <option>Public Transit</option>
            <option>Rental Car</option>
            <option>Walking / Biking</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Travel Pace</label>
          <select class="form-input">
            <option>Fast (See Everything)</option>
            <option>Moderate</option>
            <option>Slow (Relaxed)</option>
          </select>
        </div>
        <button class="btn btn-primary btn-block" style="margin-top:24px;" onclick="closePreferencesModal(); showToast('Preferences Saved!', 'success')">Save Preferences</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Javascript -->
  <script src="/js/data.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/screens/auth.js"></script>
  <script src="/js/screens/dashboard.js"></script>
  <script src="/js/screens/trips.js"></script>
  <script src="/js/screens/search.js"></script>
  <script src="/js/screens/itinerary.js"></script>
  <script src="/js/screens/budget.js"></script>
  <script src="/js/screens/packing.js"></script>
  <script src="/js/screens/misc.js"></script>
  <script src="/js/screens/chat.js"></script>
  <script src="/js/screens/profile.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
